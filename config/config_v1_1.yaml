# Rally ETA Prediction Configuration - Version 1.1 (Short Stage Fix)

project:
  name: "rally-eta-prediction"
  version: "1.1-short-stage-fix"

data:
  raw_db_path: "data/raw/rally_results.db"
  processed_path: "data/processed/"

scraping:
  tosfed_base_url: "https://sonuc.tosfed.org.tr"
  ewrc_base_url: "https://www.ewrc-results.com"
  start_year: 2023
  end_year: 2025
  rate_limit_seconds: 2

preprocessing:
  anomaly_detection:
    base_threshold_ratio: 1.5
    z_score_threshold: 3.0
    # v1.1: Adaptive z-threshold for short stages (more noise tolerance)
    z_score_short_stage_threshold: 3.5  # Used when stage_length < 7km
    short_stage_threshold_km: 7.0
    min_avg_speed_gravel: 30
    min_avg_speed_asphalt: 40
    max_avg_speed: 250

features:
  lookback_stages: 15
  min_history_for_stats: 3
  # v1.1: Short stage corrections
  stage_length_power: 0.85  # Nonlinear correction: stage_km^0.85
  short_stage_threshold_km: 7.0
  short_stage_penalty_factor: 1.03  # Expected higher variance
  # v1.1: Momentum calculation
  momentum_lookback: 5  # Last 5 vs prev 5 stages

model:
  type: "lightgbm"
  target: "ratio_to_class_best"

  hyperparameters:
    objective: "regression"
    metric: "mae"
    n_estimators: 500
    learning_rate: 0.03
    max_depth: 8
    num_leaves: 31
    min_child_samples: 20
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 0.1
    random_state: 42

  split:
    train_ratio: 0.70
    val_ratio: 0.15
    test_ratio: 0.15

inference:
  constraints:
    min_ratio: 1.0
    max_ratio: 1.35

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/rally_eta.log"
